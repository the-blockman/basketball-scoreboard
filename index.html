<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="index.css" />
    <title>Basketball Scorecard</title>
  </head>
  <body>
    <main>
      <div class="container">
        <!-- TIMER -->
        <div class="time-select">
          <label for="game-time">Game Time:</label>
          <select id="game-time">
            <option value="300">5 Minutes</option>
            <option value="420">7 Minutes</option>
            <option value="600" selected>10 Minutes</option>
            <option value="720">12 Minutes</option>
          </select>
        </div>

        <div id="timer" aria-live="polite">10:00</div>
        <div id="shot-clock">24</div>
        <button id="reset-shot">Reset Shot Clock</button>

        <!-- SCORE BOARDS -->
        <div class="score-container">
          <!-- HOME -->
          <div class="score-board">
            <h3>HOME</h3>
            <div class="display">
              <p id="home-display-text">0</p>
            </div>
            <div class="button-row">
              <button
                class="score-btn"
                data-team="home"
                data-points="1"
                aria-label="Add 1 point to home"
              >
                +1
              </button>
              <button
                class="score-btn"
                data-team="home"
                data-points="2"
                aria-label="Add 2 points to home"
              >
                +2
              </button>
              <button
                class="score-btn"
                data-team="home"
                data-points="3"
                aria-label="Add 3 points to home"
              >
                +3
              </button>
            </div>
            <button class="minus-btn" data-team="home">-1</button>
          </div>

          <!-- AWAY -->
          <div class="score-board">
            <h3>AWAY</h3>
            <div class="display">
              <p id="away-display-text">0</p>
            </div>
            <div class="button-row">
              <button
                class="score-btn"
                data-team="away"
                data-points="1"
                aria-label="Add 1 point to away"
              >
                +1
              </button>
              <button
                class="score-btn"
                data-team="away"
                data-points="2"
                aria-label="Add 2 points to away"
              >
                +2
              </button>
              <button
                class="score-btn"
                data-team="away"
                data-points="3"
                aria-label="Add 3 points to away"
              >
                +3
              </button>
            </div>
            <button class="minus-btn" data-team="away">-1</button>
          </div>
        </div>

        <!-- CONTROLS -->
        <div class="options">
          <button id="pause">Pause</button>
          <button id="resume">Resume</button>
        </div>

        <!-- RESET -->
        <button id="reset">New Game</button>
      </div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
